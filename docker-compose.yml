services:
  backend:
    image: ${DOCKERHUB_USERNAME}/fulltime:backend
    container_name: fulltiime-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # Full Neon connection string, straight from the DATABASE_URL secret.
      DATABASE_URL: ${DATABASE_URL}

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      FRONTEND_URL: ${FRONTEND_URL}
      # Parent domain for the ft_session marker cookie (e.g. .fulltiime.com)
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}

      # Transactional email (ZeptoMail)
      ZEPTOMAIL_API_KEY: ${ZEPTOMAIL_API_KEY}
      ZEPTOMAIL_FROM_EMAIL: ${ZEPTOMAIL_FROM_EMAIL}
      ZEPTOMAIL_FROM_NAME: ${ZEPTOMAIL_FROM_NAME}

      # Studio media uploads (Cloudinary)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # LLM (AI insights) — anthropic | openai | gemini
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  frontend:
    image: ${DOCKERHUB_USERNAME}/fulltime:frontend
    container_name: fulltiime-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
